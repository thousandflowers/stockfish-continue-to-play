<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e2124;
      color: #ddd;
    }
    h2 {
      font-size: 15px;
      color: #769656;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .subtitle { font-size: 11px; color: #777; margin-bottom: 14px; }
    .status-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; margin-bottom: 14px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #4caf50;
    }
    .dot.off { background: #f44336; }
    button {
      width: 100%; padding: 10px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: background 0.15s;
    }
    #toggle.on   { background: #769656; color: #fff; }
    #toggle.off  { background: #444; color: #aaa; }
    #toggle.on:hover  { background: #8cb86a; }
    #toggle.off:hover { background: #555; }
    .hint {
      margin-top: 12px; font-size: 11px; color: #666; line-height: 1.5;
    }
  </style>
</head>
<body>
  <h2>♟ Stockfish+</h2>
  <div class="subtitle">Continue to Play</div>
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Caricamento…</span>
  </div>
  <button id="toggle">Disattiva</button>
  <div class="hint">
    Il pulsante "Continua con Stockfish" apparirà nel popup di fine partita su Chess.com e Lichess.
  </div>
  <script src="popup.js"></script>
</body>
</html>
