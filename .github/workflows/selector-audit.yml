name: Selector Audit

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch: # manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install playwright @playwright/test
          npx playwright install chromium

      - name: Run selector audit
        run: node scripts/audit-selectors.mjs

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.create({
              owner,
              repo,
              title: '⚠️ Selector Audit Failed — DOM may have changed',
              body: 'The weekly selector audit detected that all extraction strategies failed. ' +
                    'Chess.com or Lichess likely updated their DOM. ' +
                    'See the workflow run: ' +
                    `https://github.com/${owner}/${repo}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              labels: ['bug', 'automated'],
            });
